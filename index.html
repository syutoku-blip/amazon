<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amazon Start Book</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;700&family=Cormorant+Garamond:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;}

:root{
  --navy:   #2C4A6E;
  --gold:   #E8C84A;
  --gold-l: #F5E17A;
  --cream:  #FAFAEC;
  --ink:    #2D3748;
  --ink2:   #4A5568;
  --ink3:   #718096;
  --teal:   #1D9E75;
  --white:  #FFFFFF;
  --s1:     #2C6B5A; --s1bg: #1D4D3F;
  --s2:     #3B82C4; --s2bg: #1E5A9E;
  --s3:     #C4607A; --s3bg: #8C3050;
  --s4:     #5C4BA6; --s4bg: #3D2E82;
  --s5:     #2C6B5A; --s5bg: #1D4D3F;
  --warn:   #EF4444;
}

body{
  font-family:'Noto Sans JP',sans-serif;
  background:#13202E;
  height:100vh;
  display:flex;align-items:center;justify-content:center;
}

/* ══ BOOK SHELL ══ */
.book{position:fixed;inset:0;display:flex;overflow:hidden;}

/* SPREAD mode: two halves */
.half{flex:1;position:relative;overflow:hidden;}
.half-L{box-shadow:inset -4px 0 30px rgba(0,0,0,.07);}
.half-R{box-shadow:inset 4px 0 30px rgba(0,0,0,.07);}

/* SINGLE mode: centered cover */
.cover-wrap{
  position:absolute;inset:0;
  display:flex;align-items:stretch;
  z-index:10;
}
.cover-side{
  flex:1;
  position:relative;
  overflow:hidden;
  background:var(--navy);
}
.cover-side::before{
  content:'';position:absolute;inset:0;
  background:
    repeating-linear-gradient(45deg,
      transparent 0px, transparent 18px,
      rgba(232,200,74,.06) 18px, rgba(232,200,74,.06) 19px
    ),
    repeating-linear-gradient(-45deg,
      transparent 0px, transparent 18px,
      rgba(232,200,74,.06) 18px, rgba(232,200,74,.06) 19px
    );
}
.cover-side::after{
  content:'';position:absolute;
  width:260px;height:260px;border-radius:50%;
  border:1px solid rgba(232,200,74,.15);
  top:50%;left:50%;transform:translate(-50%,-50%);
  box-shadow:0 0 0 50px rgba(232,200,74,.04),0 0 0 100px rgba(232,200,74,.02);
}
.cover-side-L{box-shadow:inset -16px 0 40px rgba(0,0,0,.5);}
.cover-side-R{box-shadow:inset 16px 0 40px rgba(0,0,0,.5);}

/* 左右パネルのWSロゴ文字 */
.cover-side-L .side-txt{
  position:absolute;bottom:40px;left:0;right:0;
  text-align:center;
  font-size:10px;letter-spacing:6px;color:rgba(232,200,74,.3);font-weight:300;
}
.cover-side-R .side-txt{
  position:absolute;top:40px;left:0;right:0;
  text-align:center;
  font-size:10px;letter-spacing:6px;color:rgba(232,200,74,.3);font-weight:300;
}

.cover-center{
  flex:0 0 50%;
  position:relative;
  overflow:visible;
  box-shadow:-12px 0 40px rgba(0,0,0,.5), 12px 0 40px rgba(0,0,0,.5);
  z-index:20;
}

/* 表紙右下のページめくり */
.page-curl-wrap{
  position:fixed;
  z-index:500;
  cursor:pointer;
  overflow:hidden; /* はみ出しをクリップ */
}
.page-curl-wrap img{
  display:block;
  width:100%;
  height:100%;
  pointer-events:none;
  transform-origin:bottom right; /* 右下コーナー固定 */
  transition:transform .38s cubic-bezier(.25,1,.5,1);
}
.page-curl-wrap:hover img{
  transform:scale(1.15);
}

/* NEXTラベル：常に表示、右下横書き */
.page-curl-next{
  position:absolute;
  right:10px;
  bottom:12px;
  display:flex;
  flex-direction:row;
  align-items:center;
  gap:5px;
  pointer-events:none;
}
.page-curl-next-arr{
  font-size:16px;
  color:#7a6030;
  font-family:'Cormorant Garamond',serif;
  line-height:1;
  animation:nextBounce 1.2s ease-in-out infinite;
}
.page-curl-next-txt{
  writing-mode:horizontal-tb;
  font-size:11px;
  letter-spacing:3px;
  color:#7a6030;
  font-weight:700;
  font-family:'Noto Sans JP',sans-serif;
  white-space:nowrap;
}
@keyframes nextBounce{
  0%,100%{ transform:translateX(0); }
  50%     { transform:translateX(4px); }
}

/* 左ページめくり：transform-originを左下に */
.page-curl-left{
  overflow:hidden;
}
.page-curl-left img{
  transform-origin:bottom left !important;
}
.page-curl-left:hover img{
  transform:scale(1.15);
}

/* シワ要素は不要 */
.curl-crease{display:none;}
.curl-icon{display:none;}

/* 旧スタイル */
.single-page{display:none;}
.single-left-bg{display:none;}

.spine{
  position:absolute;top:0;bottom:0;left:50%;transform:translateX(-50%);
  width:8px;z-index:200;pointer-events:none;
  background:linear-gradient(to right,rgba(0,0,0,.20) 0%,rgba(0,0,0,.05) 40%,rgba(255,255,255,.08) 50%,rgba(0,0,0,.05) 60%,rgba(0,0,0,.20) 100%);
}
.book::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(to bottom,rgba(0,0,0,.14),transparent);z-index:300;pointer-events:none;}
.book::after {content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(to top,rgba(0,0,0,.14),transparent);z-index:300;pointer-events:none;}

/* ══ FLIP ══ */
.flip-page{
  position:absolute;top:0;bottom:0;left:50%;width:50%;
  transform-origin:left center;transform-style:preserve-3d;
  z-index:50;pointer-events:none;
}
.flip-front,.flip-back{position:absolute;inset:0;backface-visibility:hidden;overflow:hidden;}
.flip-back{transform:rotateY(180deg);}
.flip-page.fwd{animation:fFwd .7s cubic-bezier(.645,.045,.355,1) forwards;}
.flip-page.bck{animation:fBck .7s cubic-bezier(.645,.045,.355,1) forwards;}
@keyframes fFwd{0%{transform:rotateY(0)}100%{transform:rotateY(-180deg)}}
@keyframes fBck{0%{transform:rotateY(-180deg)}100%{transform:rotateY(0)}}
.flip-page.fwd .flip-front::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to left,rgba(0,0,0,.14),transparent 55%);
  animation:sh .7s forwards;z-index:10;pointer-events:none;
}
@keyframes sh{0%{opacity:0}40%{opacity:1}100%{opacity:0}}

/* ══ EDGE ZONES ══ */
.edge{position:absolute;top:0;bottom:0;width:90px;z-index:150;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.edge-L{left:0;} .edge-R{right:0;}
.edge-arr{font-size:34px;color:rgba(0,0,0,0);transition:color .2s;pointer-events:none;user-select:none;font-family:'Cormorant Garamond',serif;}
.edge:hover .edge-arr{color:rgba(0,0,0,.11);}
.edge-curl{position:absolute;bottom:0;width:0;height:0;pointer-events:none;transition:width .22s,height .22s;}
.edge-curl-L{left:0;} .edge-curl-R{right:0;}
.edge-curl::after{content:'';position:absolute;bottom:0;width:80px;height:80px;}
.edge-curl-L::after{left:0;background:conic-gradient(from 180deg at 0% 100%,rgba(0,0,0,.11) 0deg,#EEEEDD 42deg,transparent 85deg);}
.edge-curl-R::after{right:0;background:conic-gradient(from 90deg at 100% 100%,rgba(0,0,0,.11) 0deg,#EEEEDD 42deg,transparent 85deg);}
.edge:hover .edge-curl{width:66px;height:66px;}

/* ══ DOTS ══ */
.dots{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);display:flex;gap:9px;z-index:400;}
.dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.22);border:none;cursor:pointer;transition:all .18s;}
.dot.on{background:rgba(255,255,255,.72);transform:scale(1.45);}

/* ══ PAGE CONTENT ══ */
.page{position:absolute;inset:0;overflow:hidden;}
.cream{background:var(--cream);}

.top-bar{position:absolute;top:0;left:0;right:0;height:8px;}

.step-tag{
  position:absolute;top:16px;left:0;
  padding:6px 20px 6px 12px;
  font-size:10px;font-weight:700;letter-spacing:3.5px;color:#fff;
  border-radius:0 4px 4px 0;z-index:10;
}

.pgn{position:absolute;bottom:16px;font-size:12px;color:var(--ink3);font-family:'Cormorant Garamond',serif;font-style:italic;}
.pgn-l{left:24px;} .pgn-r{right:24px;}

/* ══ COVER ══ */
.cover-bg{
  position:absolute;inset:0;
  background:var(--navy);
  display:flex;flex-direction:column;justify-content:space-between;
  padding:60px 80px 70px;overflow:hidden;
}
.cover-ring{position:absolute;border-radius:50%;border:1px solid rgba(232,200,74,.18);pointer-events:none;}
.cover-ws{font-size:12px;letter-spacing:5px;color:var(--gold);opacity:.55;font-weight:300;}
.cover-title{font-family:'Cormorant Garamond',serif;font-size:108px;font-weight:600;color:var(--gold);line-height:.98;display:block;margin-top:24px;}
.cover-sub{font-size:17px;font-weight:300;color:rgba(255,255,255,.62);line-height:2.1;letter-spacing:1.5px;margin-top:20px;display:block;}
.cover-badge{
  display:inline-flex;align-items:center;
  border:1.5px solid var(--gold);border-radius:100px;
  padding:10px 26px;font-size:11.5px;font-weight:700;letter-spacing:3.5px;color:var(--gold);opacity:.82;
}

/* ══ INTRO ══ */
.intro-lbl{
  position:absolute;top:0;left:0;
  background:var(--gold);padding:8px 18px 8px 12px;
  font-size:10px;font-weight:700;letter-spacing:3px;color:var(--navy);
  border-radius:0 0 6px 0;
}
.intro-title{font-size:34px;font-weight:700;color:var(--s3bg);line-height:1.3;margin-bottom:8px;}
.intro-title u{text-decoration-color:var(--gold);}
.intro-body{font-size:17px;color:var(--s3bg);line-height:1.95;margin-bottom:22px;}
.intro-desc{font-size:15px;color:var(--ink3);line-height:2.05;}

.sticky{
  display:inline-flex;align-items:center;justify-content:center;
  background:#B8DDED;font-size:20px;font-weight:700;color:var(--navy);
  padding:12px 28px;border-radius:4px 4px 0 0;
  box-shadow:3px 3px 0 rgba(0,0,0,.1);
}

/* Step row (目次) */
.step-list{display:flex;flex-direction:column;}
.step-row{
  display:flex;align-items:center;gap:16px;
  padding:14px 4px;border-bottom:1px solid rgba(0,0,0,.07);
  cursor:pointer;transition:padding-left .13s;
}
.step-row:last-child{border-bottom:none;}
.step-row:hover{padding-left:8px;}
.step-row-circle{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;flex-shrink:0;}
.step-row-label{font-size:18px;font-weight:700;color:var(--ink);}
.step-row-sub{font-size:14px;color:var(--ink3);margin-top:5px;}
.step-row-arr{font-size:18px;color:var(--ink3);}

/* ══ CHAPTER PAGES ══ */
.ch-title{font-family:'Noto Serif JP',serif;font-size:64px;font-weight:700;line-height:1.0;margin-bottom:36px;}

/* Section label pill */
.pill{
  display:inline-flex;align-items:center;
  height:26px;padding:0 14px;border-radius:13px;
  font-size:10px;font-weight:700;letter-spacing:2px;
  border:1px solid currentColor;line-height:1;
}

.q-mark{font-size:24px;font-weight:700;font-family:'Cormorant Garamond',serif;line-height:1;flex-shrink:0;}
.help-q-row{display:flex;align-items:center;gap:12px;margin-bottom:12px;padding:10px 14px;border-radius:8px;}
.help-q-text{font-size:16.5px;font-weight:700;line-height:1.35;}
.help-body{font-size:14.5px;color:var(--ink2);line-height:1.9;margin-bottom:12px;}
.help-block{padding:28px 0;border-bottom:1px solid rgba(0,0,0,.07);}
.help-block:last-child{border-bottom:none;padding-bottom:0;}

.cta{
  display:inline-flex;align-items:center;gap:4px;
  font-size:13px;font-weight:700;color:var(--teal);
  cursor:pointer;background:none;border:none;
  font-family:'Noto Sans JP',sans-serif;padding:0;
  text-decoration:underline;text-underline-offset:2px;
  transition:opacity .15s;
}
.cta:hover{opacity:.72;}

.tip-pill{
  display:flex;align-items:flex-start;gap:7px;
  background:#FEF9E0;border:1px solid #E8C84A;
  border-radius:8px;padding:9px 14px;
  font-size:12.5px;color:#6B5200;line-height:1.68;
  margin-bottom:9px;
}

.hr{border:none;border-top:1px solid rgba(0,0,0,.08);margin:0;}

/* prep cards */
.prep-card{display:flex;align-items:center;gap:16px;border-radius:14px;padding:26px 28px;margin-bottom:14px;position:relative;overflow:hidden;}
.prep-card-num{font-family:'Noto Sans JP',sans-serif;font-size:52px;font-weight:700;opacity:.7;line-height:1;flex-shrink:0;width:52px;display:flex;align-items:center;justify-content:center;align-self:center;}
.prep-card-title{font-size:19px;font-weight:700;margin-bottom:14px;}
.prep-card-desc{font-size:16.5px;line-height:1.95;}

/* toggle */
.toggle-row{display:flex;border-radius:8px;overflow:hidden;border:1px solid rgba(0,0,0,.1);margin-bottom:16px;}
.tog{flex:1;padding:10px 6px;border:none;font-size:13.5px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .16s;}
.af{display:none;}.af.vis{display:block;}

/* flow */
.flow{display:flex;flex-direction:column;}
.flow-item{display:flex;gap:16px;}
.flow-col{display:flex;flex-direction:column;align-items:center;flex-shrink:0;}
.flow-dot{width:32px;height:32px;border-radius:50%;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:2px solid rgba(255,255,255,0.5);}
.flow-ln{width:2px;flex:1;min-height:8px;margin:3px 0;border-left:2px dashed rgba(255,255,255,0.3);background:transparent;}
.flow-txt{padding:2px 0 16px;flex:1;}
.flow-t{font-size:17px;font-weight:700;color:var(--ink);margin-bottom:10px;}
.flow-d{font-size:14px;color:var(--ink3);line-height:1.8;}

/* chips */
.chip{display:inline-flex;align-items:center;height:30px;padding:0 16px;border-radius:15px;font-size:12px;font-weight:700;border:1px solid;}

/* 3 box */
.three-box{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px;}
.tbox{padding:14px 10px;text-align:center;border-radius:9px;background:rgba(255,255,255,.55);border:1px solid rgba(0,0,0,.08);}
.tbox-icon{font-size:22px;display:block;margin-bottom:6px;}
.tbox-label{font-size:14px;font-weight:700;color:var(--ink);line-height:1.55;}

/* num steps */
.num-step{display:flex;gap:14px;padding:20px 0;border-bottom:1px solid rgba(0,0,0,.07);}
.num-step:last-child{border-bottom:none;}
.num-n{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;opacity:.35;line-height:1;flex-shrink:0;width:36px;}
.num-t{font-size:16.5px;font-weight:700;color:var(--ink);margin-bottom:11px;}
.num-d{font-size:14.5px;color:var(--ink3);line-height:1.9;}

/* warn */
.warn-item{display:flex;gap:12px;align-items:flex-start;padding:20px 0;border-bottom:1px solid rgba(0,0,0,.07);font-size:14.5px;color:var(--ink2);line-height:1.9;}
.warn-item:last-child{border-bottom:none;}

/* ng */
.ng-item{display:flex;align-items:baseline;gap:12px;padding:18px 0;border-bottom:1px solid rgba(0,0,0,.07);font-size:14.5px;color:var(--ink);line-height:1.85;}
.ng-item:last-child{border-bottom:none;}
.ng-x{font-size:15px;font-weight:700;color:var(--warn);flex-shrink:0;}

/* info block */
.info-block{padding:14px 0;border-bottom:1px solid rgba(0,0,0,.07);}
.info-block:last-child{border-bottom:none;padding-bottom:0;}
.info-title{font-size:16.5px;font-weight:700;color:var(--ink);margin-bottom:10px;}
.info-body{font-size:14.5px;color:var(--ink2);line-height:1.9;}

/* point box */
.point-box{border-radius:9px;padding:16px 18px;margin-bottom:16px;border:1px solid;}

/* mgmt */
.mgmt-item{display:flex;gap:14px;padding:22px 0;border-bottom:1px solid rgba(0,0,0,.07);}
.mgmt-item:last-child{border-bottom:none;}
.mgmt-icon-box{width:42px;height:42px;border-radius:9px;background:rgba(255,255,255,.55);border:1px solid rgba(0,0,0,.08);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.mgmt-t{font-size:16.5px;font-weight:700;color:var(--ink);margin-bottom:12px;}
.mgmt-d{font-size:14.5px;color:var(--ink3);line-height:1.9;}

/* cta card */
.cta-card{background:var(--navy);border-radius:12px;padding:22px 26px;margin-bottom:12px;}
.cta-card:last-child{margin-bottom:0;}
.cta-card-label{font-size:22px;font-weight:700;color:var(--gold);margin-bottom:8px;}
.cta-card-body{font-size:15px;color:rgba(255,255,255,.62);line-height:1.85;margin-bottom:16px;}
.cta-card-btn{display:inline-flex;align-items:center;gap:6px;background:var(--teal);color:#fff;font-size:13px;font-weight:700;padding:9px 20px;border-radius:7px;border:none;cursor:pointer;font-family:'Noto Sans JP',sans-serif;}
</style>
</head>
<body>

<div class="book" id="book">
  <!-- spread halves (shown for multi-page spreads) -->
  <div class="half half-L" id="halfL"></div>
  <div class="half half-R" id="halfR"></div>
  <div class="spine" id="spine"></div>

  <!-- single full-page (cover) -->
  <!-- 左右の装飾パネルと中央の表紙 -->
  <div class="cover-wrap" id="coverWrap" style="display:none;">
    <div class="cover-side cover-side-L" id="coverSideL"><div class="side-txt">W O R L D S H I F T</div></div>
    <div class="cover-center" id="singlePage"></div>
    <div class="cover-side cover-side-R" id="coverSideR"><div class="side-txt">W O R L D S H I F T</div></div>
  </div>

/* ═══════════════════════════════════════
   ENGINE
═══════════════════════════════════════ */
let cur=0,busy=false;
const total=S.length;
const dotsEl=document.getElementById('dots');
S.forEach((_,i)=>{
  const d=document.createElement('button');
  d.className='dot'+(i===0?' on':'');
  d.onclick=()=>{if(!busy)jumpTo(i);};
  dotsEl.appendChild(d);
});

const halfL=document.getElementById('halfL');
const halfR=document.getElementById('halfR');
const spine=document.getElementById('spine');
const singlePage=document.getElementById('singlePage');
const coverWrap=document.getElementById('coverWrap');
const pageCurlEl=document.getElementById('pageCurlWrap');
const pageCurlLeftEl=document.getElementById('pageCurlLeft');

function positionCurlLeft(){
  if(!pageCurlLeftEl) return;

  const sp=S[cur];
  const isBackCover = (cur===total-1 && sp.type==='single');
  const isSpread = (sp.type!=='single' && cur>0);

  /* 表示条件：見開きページ（最初以外）または裏表紙 */
  if(!isSpread && !isBackCover){
    pageCurlLeftEl.style.display='none'; return;
  }

  const anchor = isBackCover
    ? document.getElementById('singlePage')
    : document.getElementById('halfL');
  if(!anchor){ pageCurlLeftEl.style.display='none'; return; }

  const rect=anchor.getBoundingClientRect();

  /* サイズ：裏表紙は30%（表紙と同じ）、見開きは11% */
  const sizeRatio = isBackCover ? 0.30 : 0.11;
  const curlH=Math.round(rect.height * sizeRatio);
  const curlW=Math.round(curlH * (400/348));
  const scale=1.15;
  const clampW=Math.min(Math.round(curlW*scale), Math.round(rect.width));
  const clampH=Math.min(Math.round(curlH*scale), Math.round(rect.height));

  /* 左下コーナーに配置 */
  pageCurlLeftEl.style.left   = rect.left+'px';
  pageCurlLeftEl.style.top    = (rect.bottom - clampH)+'px';
  pageCurlLeftEl.style.width  = clampW+'px';
  pageCurlLeftEl.style.height = clampH+'px';
  pageCurlLeftEl.style.right  = 'auto';
  pageCurlLeftEl.style.bottom = 'auto';
  pageCurlLeftEl.style.display= 'block';

  const imgEl=pageCurlLeftEl.querySelector('img');
  if(imgEl){
    /* 裏表紙はカバー画像、見開きはスプレッド画像 */
    const srcKey = isBackCover ? 'data-cover' : 'data-spread';
    imgEl.src = imgEl.getAttribute(srcKey) || imgEl.src;
    imgEl.style.width   = curlW+'px';
    imgEl.style.height  = curlH+'px';
    imgEl.style.position= 'absolute';
    imgEl.style.left    = '0';
    imgEl.style.bottom  = '0';
    imgEl.style.right   = 'auto';
  }
}

/* ── ページめくり画像配置（全ページ共通）──
   表紙(single): singlePageの右下
   見開き(spread): halfRの右下
   最終ページ: 非表示
*/
function positionCurl(){
  if(!pageCurlEl) return;
  if(cur>=total-1){ pageCurlEl.style.display='none'; return; }

  const sp=S[cur];
  const anchor = sp.type==='single'
    ? document.getElementById('singlePage')
    : document.getElementById('halfR');
  if(!anchor){ pageCurlEl.style.display='none'; return; }

  const rect=anchor.getBoundingClientRect();

  /* サイズ: 表紙は30%、見開きは11%（小さめ） */
  const sizeRatio = sp.type==='single' ? 0.30 : 0.11;
  const curlH=Math.round(rect.height * sizeRatio);
  const curlW=Math.round(curlH * (400/348));

  /* NEXTラベル：表紙のみ表示 */
  const nextEl=pageCurlEl.querySelector('.page-curl-next');
  if(nextEl) nextEl.style.display = sp.type==='single' ? 'flex' : 'none';

  /* 表紙と見開きで画像を切り替え */
  const imgEl=pageCurlEl.querySelector('img');
  if(imgEl){
    const srcKey = sp.type==='single' ? 'data-cover' : 'data-spread';
    imgEl.src = imgEl.getAttribute(srcKey);
  }

  const scale=1.15;
  const clampW=Math.min(Math.round(curlW*scale), Math.round(rect.width));
  const clampH=Math.min(Math.round(curlH*scale), Math.round(rect.height));

  pageCurlEl.style.left   = (rect.right  - clampW)+'px';
  pageCurlEl.style.top    = (rect.bottom - clampH)+'px';
  pageCurlEl.style.width  = clampW+'px';
  pageCurlEl.style.height = clampH+'px';
  pageCurlEl.style.right  = 'auto';
  pageCurlEl.style.bottom = 'auto';
  pageCurlEl.style.display= 'block';

  const imgEl2=pageCurlEl.querySelector('img');
  if(imgEl2){
    imgEl2.style.width   = curlW+'px';
    imgEl2.style.height  = curlH+'px';
    imgEl2.style.position= 'absolute';
    imgEl2.style.right   = '0';
    imgEl2.style.bottom  = '0';
  }
}

function render(){
  const sp=S[cur];
  if(sp.type==='single'){
    halfL.style.display='none';
    halfR.style.display='none';
    spine.style.display='none';
    coverWrap.style.display='flex';
    singlePage.innerHTML=sp.page;
  } else {
    halfL.style.display='';
    halfR.style.display='';
    spine.style.display='';
    coverWrap.style.display='none';
    singlePage.innerHTML='';
    halfL.innerHTML=sp.L;
    halfR.innerHTML=sp.R;
  }
  requestAnimationFrame(()=>{ positionCurl(); positionCurlLeft(); });
  const eL=document.getElementById('edgeL');
  const eR=document.getElementById('edgeR');
  const isSingle=S[cur].type==='single';
  eL.style.opacity=cur===0?'0':'1';
  eL.style.pointerEvents=cur===0?'none':'auto';
  /* 表紙（single）のときはedgeRを非表示 — カールボタンで代替 */
  eR.style.opacity=(cur===total-1||isSingle)?'0':'1';
  eR.style.pointerEvents=(cur===total-1||isSingle)?'none':'auto';
  document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('on',i===cur));
}

function flipForward(){
  if(busy||cur>=total-1)return;
  const nextSp=S[cur+1];
  const curSp=S[cur];
  // Both single: instant
  if(curSp.type==='single'&&nextSp.type==='single'){cur++;render();return;}
  busy=true;
  pageCurlEl.style.display='none'; // めくり中は非表示
  if(pageCurlLeftEl) pageCurlLeftEl.style.display='none';
  const next=cur+1;

  if(curSp.type==='single'){
    // single→spread: no flip, just switch
    cur=next;render();busy=false;return;
  }

  // spread→spread or spread→single: flip right page
  const fp=document.createElement('div');fp.className='flip-page';
  const fr=document.createElement('div');fr.className='flip-front';fr.innerHTML=curSp.R;
  const bk=document.createElement('div');bk.className='flip-back';
  if(nextSp.type==='single'){bk.innerHTML='<div style="position:absolute;inset:0;background:var(--cream);"></div>';}
  else{bk.innerHTML=nextSp.L;}
  fp.appendChild(fr);fp.appendChild(bk);
  document.getElementById('book').appendChild(fp);
  if(nextSp.type==='single'){halfR.innerHTML='<div style="position:absolute;inset:0;background:var(--cream);"></div>';}
  else{halfR.innerHTML=nextSp.R;}

  requestAnimationFrame(()=>{
    fp.classList.add('fwd');
    fp.addEventListener('animationend',()=>{
      fp.remove();cur=next;render();busy=false;
    },{once:true});
  });
}

function flipBack(){
  if(busy||cur<=0)return;
  const prevSp=S[cur-1];
  const curSp=S[cur];
  if(curSp.type==='single'&&prevSp.type==='single'){cur--;render();return;}
  busy=true;
  pageCurlEl.style.display='none'; // めくり中は非表示
  if(pageCurlLeftEl) pageCurlLeftEl.style.display='none';
  const prev=cur-1;

  if(curSp.type==='single'){
    cur=prev;render();busy=false;return;
  }

  const fp=document.createElement('div');fp.className='flip-page';fp.style.transform='rotateY(-180deg)';
  const fr=document.createElement('div');fr.className='flip-front';
  if(prevSp.type==='single'){fr.innerHTML='<div style="position:absolute;inset:0;background:var(--cream);"></div>';}
  else{fr.innerHTML=prevSp.R;}
  const bk=document.createElement('div');bk.className='flip-back';bk.innerHTML=curSp.L;
  fp.appendChild(fr);fp.appendChild(bk);
  document.getElementById('book').appendChild(fp);
  if(prevSp.type==='single'){halfL.innerHTML='<div style="position:absolute;inset:0;background:var(--cream);"></div>';}
  else{halfL.innerHTML=prevSp.L;}

  requestAnimationFrame(()=>{
    fp.classList.add('bck');
    fp.addEventListener('animationend',()=>{
      fp.remove();cur=prev;render();busy=false;
    },{once:true});
  });
}

function jumpTo(i){if(busy||i===cur)return;cur=i;render();}
function goTo(i){jumpTo(i);}
function askAI(t){if(window.sendPrompt)window.sendPrompt(t);}
function sw(type){
  const n=type==='new';
  const aN=document.getElementById('aN'),aH=document.getElementById('aH');
  const tN=document.getElementById('tN'),tH=document.getElementById('tH');
  if(!aN||!aH||!tN||!tH)return;
  aN.classList.toggle('vis',n);aH.classList.toggle('vis',!n);
  tN.style.background=n?'var(--s2)':'var(--cream)';tN.style.color=n?'#fff':'var(--ink3)';
  tH.style.background=!n?'var(--s2)':'var(--cream)';tH.style.color=!n?'#fff':'var(--ink3)';
}

render();
window.addEventListener('resize',()=>{ positionCurl(); positionCurlLeft(); });
</script>
